# -----------------------------------------------------
# CONFIGURAÇÃO DE MONITORES
# -----------------------------------------------------

# Monitor Principal (HDMI) - Centro/Referência
monitor = HDMI-A-1, 1920x1080@75, 0x0, 1

# Monitor Secundário (Esquerda)
# Nota: Se o monitor for 1280px de largura, mantém -1280x0.
# Se for 1920px, muda para -1920x0.
monitor = DP-1, preferred, -1280x0, 1

# Remover a linha genérica ", preferred, 1920x0" para não criar ecrãs fantasma
# a menos que tenhas UM TERCEIRO monitor.

# --- WORKSPACES DINÂMICAS ---

workspace = 1, monitor:HDMI-A-1
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1
workspace = 6, monitor:HDMI-A-1
workspace = 7, monitor:HDMI-A-1
workspace = 8, monitor:HDMI-A-1
workspace = 9, monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1

# Workspaces 11 a 20 -> Monitor da ESQUERDA (DP-1)
# IMPORTANTE: Mudei de eDP-1 para DP-1 para coincidir com a tua linha acima
exec-once = bash -c 'for i in {11..20}; do hyprctl keyword workspace "$i, monitor:DP-1"; done'
