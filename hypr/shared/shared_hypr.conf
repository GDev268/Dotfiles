misc {
    vrr = 1
}

# --- Visual Moderno (Arredondado e Vibrante) ---
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(333333ee) # Borda cinza profunda, quase invisível
    col.inactive_border = rgba(212121ff)
    layout = dwindle
}

decoration {
    rounding = 0 # Cantos retos para máxima imersão técnica

    shadow {
        enabled = false # Sombras distraem num look monolítico
    }

    blur {
        size = 5
        passes = 3
        brightness = 0.8
    }
}


# --- Regras de Transparência ---
windowrule {
  name = windowrule-1
  float = on
  size = 450 600
  move = ((monitor_w*0.7)) (50)
  match:class = (pavucontrol)
}


windowrule {
  name = windowrule-2
  float = on
  size = 450 600
  move = ((monitor_w*0.65)) (50)
  match:class = (blueman-manager)
}


windowrule {
  name = windowrule-3
  float = on
  size = 450 600
  move = ((monitor_w*0.6)) (50)
  match:class = (nm-connection-editor)
}


# --- Transparência para ver o Blur ---
windowrule {
  name = windowrule-4
  float = true
  size = 900 600
  center = true
  match:class = Alacritty
}

windowrule {
  name = windowrule-5
  opacity = 0.6 0.6
  match:class = Nautilus
}

# --- Animações ---
animations {
    enabled = yes

    # 1. The 'Bouncy' Bezier: High overshoot (1.2) for that physical pop
    bezier = bounce, 0.2, 1.2, 0.4, 1.1

    # A dedicated 'heavy' bounce for moving whole screens
    bezier = workspaceBounce, 0.2, 1.1, 0.3, 1.05

    # 2. The 'Smooth' Bezier: A classic "ease-out-expo" style for sliding
    bezier = smooth, 0.25, 1, 0.5, 1

    # Windows: Use 'popin' with the bounce curve
    # Increased duration (6) makes the "ease" visible and luxurious
    animation = windows, 1, 6, bounce, popin 70%
    animation = windowsOut, 1, 5, smooth, popin 85%
    animation = windowsMove, 1, 5, bounce

    # Workspaces: Large movements feel better with the 'smooth' curve
    # Using 'slide' creates a physical sense of space
    animation = workspaces, 1, 5, workspaceBounce, slide

    # Borders: Quick and snappy
    animation = border, 1, 3, default

    # Fades: Completely removed as requested
    animation = fade, 0
}

# --- Keybindings (Mantidos do Original) ---
$mainMod = SUPER
bind = $mainMod, Z, exec, alacritty
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, nautilus
bind = $mainMod, V, togglefloating,
bind = $mainMod, Tab, exec, rofi -show drun
bind = $mainMod, P, pseudo,
bind = $mainMod, F, fullscreen, 0  # Fullscreen total
bind = $mainMod, M, fullscreen, 1  # Maximizar mantendo a barra

bind = $mainMod, right, workspace, r+1
bind = $mainMod, left, workspace, r-1

# Mover Janela para outra Workspace (Tu + Janela)
bind = $mainMod ALT, right, movetoworkspace, r+1
bind = $mainMod ALT, left, movetoworkspace, r-1

bind = $mainMod, Print, exec, grim -g "$(slurp)" - | wl-copy

# --- Interação com o Rato (Super + Drag) ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod SHIFT, M, exit, # Sair do Hyprland (Seguro)
bind = $mainMod, X, exec, wlogout # Menu de energia que criámos

# --- Teclas de Brilho (HP Laptop) ---
binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# --- Teclas de Volume (HP Laptop) ---
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# --- Media Player (Se o teu HP tiver as teclas de Play/Pause) ---
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous


windowrule {
  name = windowrule-6
  float = on
  size = 600 450
  move = ((monitor_w*0.68)) (monitor_h*0.50)
  match:title = tui_menu
}

# Window Rule
layerrule {
  name = layerrule-1
  blur = on
  ignore_alpha = 0
  match:namespace = waybar
}


windowrule {
  name = windowrule-7
  float = on
  size = 800 500
  move = (center)
  match:title = ^(tui_calendar)$
}
